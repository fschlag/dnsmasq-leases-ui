<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>dnsmasq-web</title>
	<style>
		body { font-family: monospace; }
		th, td { text-align: left; padding-bottom: 5px; padding-right: 30px; }
		tr:hover { background: #ccc; }
		th { cursor: pointer; user-select: none; }
		th:hover { text-decoration: underline; }
		th.sorted { font-weight: bold; }
		.sort-indicator { display: inline-block; width: 1em; color: #888; }
	</style>
</head>
<body>
<table id="leases">
	<thead>
		<tr>
			<th data-key="ipAddress">IP Address<span class="sort-indicator"></span></th>
			<th data-key="macAddress">Mac Address<span class="sort-indicator"></span></th>
			<th data-key="name">Name<span class="sort-indicator"></span></th>
			<th data-key="staticIP">Static IP<span class="sort-indicator"></span></th>
			<th data-key="leasetime">Lease ends on<span class="sort-indicator"></span></th>
		</tr>
	</thead>
	<tbody></tbody>
</table>
<script>
(() => {
	const STORAGE_KEY = 'dnsmasq-leases-sort';
	const DEFAULT_SORT = { column: 'ipAddress', dir: 'asc' };
	let leases = [];
	let currentSort = loadSort();

	function loadSort() {
		try {
			const raw = localStorage.getItem(STORAGE_KEY);
			if (raw) {
				const parsed = JSON.parse(raw);
				if (parsed && parsed.column && parsed.dir) return parsed;
			}
		} catch (e) {}
		return { ...DEFAULT_SORT };
	}

	function saveSort(sort) {
		try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sort)); } catch (e) {}
	}

	function ipToTuple(ip) {
		if (typeof ip !== 'string') return [0,0,0,0];
		if (ip.includes('.') && !ip.includes(':')) {
			return ip.split('.').map(p => parseInt(p, 10) || 0);
		}
		return [ip];
	}

	function cmp(a, b, column) {
		const va = a[column], vb = b[column];
		if (column === 'ipAddress') {
			const ta = ipToTuple(va), tb = ipToTuple(vb);
			for (let i = 0; i < Math.max(ta.length, tb.length); i++) {
				const ea = ta[i] || 0, eb = tb[i] || 0;
				if (ea < eb) return -1;
				if (ea > eb) return 1;
			}
			return 0;
		}
		if (column === 'staticIP') {
			if (va === vb) return cmp(a, b, 'ipAddress');
			return va ? -1 : 1;
		}
		if (va < vb) return -1;
		if (va > vb) return 1;
		return 0;
	}

	function render() {
		const sorted = leases.slice().sort((a, b) => {
			const c = cmp(a, b, currentSort.column);
			return currentSort.dir === 'desc' ? -c : c;
		});
		const tbody = document.querySelector('#leases tbody');
		tbody.replaceChildren(...sorted.map(row => {
			const tr = document.createElement('tr');
			for (const val of [
				row.ipAddress,
				row.macAddress,
				row.name,
				row.staticIP ? 'Yes' : 'No',
				row.staticIP ? 'Never' : row.leasetime,
			]) {
				const td = document.createElement('td');
				td.textContent = val;
				tr.appendChild(td);
			}
			return tr;
		}));
		updateIndicators();
	}

	function updateIndicators() {
		document.querySelectorAll('#leases th').forEach(th => {
			const key = th.dataset.key;
			const ind = th.querySelector('.sort-indicator');
			if (key === currentSort.column) {
				th.classList.add('sorted');
				ind.textContent = currentSort.dir === 'asc' ? ' ▲' : ' ▼';
			} else {
				th.classList.remove('sorted');
				ind.textContent = '';
			}
		});
	}

	document.querySelector('#leases thead').addEventListener('click', e => {
		const th = e.target.closest('th');
		if (!th) return;
		const key = th.dataset.key;
		if (currentSort.column === key) {
			currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
		} else {
			currentSort = { column: key, dir: 'asc' };
		}
		saveSort(currentSort);
		render();
	});

	updateIndicators();

	fetch('leases')
		.then(r => r.json())
		.then(data => { leases = data.leases; render(); })
		.catch(err => console.error('Failed to load leases', err));
})();
</script>
</body>
</html>
